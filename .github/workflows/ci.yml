name: CI - Tests & Lint

# This workflow runs on every push to main/develop branches
# - Critical tests: Always run (no database required)
# - Integration tests: Only run if Supabase credentials are configured
# - E2E tests: Only run if Supabase credentials are configured
# - Security checks: Always run
# Last updated: 2026-01-27

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "Linter not configured - skipping"
        continue-on-error: true

      - name: Type check (TSC)
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Run critical tests
        run: npm test -- tests/critical
        continue-on-error: false

      # v3.74.740 — integration and E2E now gate on TEST_* credentials, not the
      # application's.
      #
      # These suites create and delete users, companies, invoices, payments and
      # journal entries. They previously read NEXT_PUBLIC_SUPABASE_URL and
      # SUPABASE_SERVICE_ROLE_KEY — the same secrets this workflow passes to the
      # app. Adding those secrets to "turn the tests on" would have started
      # writing test companies into the live accounting database on every push.
      #
      # They also ran with continue-on-error: true, so failures were invisible.
      # Running something whose result you ignore is worse than not running it:
      # it buys a feeling of coverage and pays nothing for it. Now they either
      # run for real and block, or they are honestly reported as not wired up.
      - name: Check for a dedicated test database
        id: check-credentials
        run: |
          if [ -n "${{ secrets.TEST_SUPABASE_URL }}" ] && [ -n "${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "credentials_available=true" >> $GITHUB_OUTPUT
          else
            echo "credentials_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API integration tests
        if: steps.check-credentials.outputs.credentials_available == 'true'
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm test -- tests/integration

      - name: Run E2E tests
        if: steps.check-credentials.outputs.credentials_available == 'true'
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm test -- tests/e2e

      - name: Integration and E2E are NOT running
        if: steps.check-credentials.outputs.credentials_available == 'false'
        run: |
          echo "::warning title=Integration and E2E tests are not running::TEST_SUPABASE_URL and TEST_SUPABASE_SERVICE_ROLE_KEY are not set."
          echo ""
          echo "58 test cases across tests/integration and tests/e2e are NOT executing."
          echo "The only suite guarding this build is tests/critical."
          echo ""
          echo "To enable them, create a SEPARATE Supabase project for tests and add:"
          echo "  TEST_SUPABASE_URL"
          echo "  TEST_SUPABASE_SERVICE_ROLE_KEY"
          echo ""
          echo "Do NOT point these at production. The suites create and delete"
          echo "users, companies, invoices and journal entries, and test-setup.ts"
          echo "will refuse the production project ref outright."

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # v3.74.736 — replaces a hand-written list of three files.
      #
      # The old step checked that requireOwnerOrAdmin or secureApiRequest was
      # CALLED in fix-inventory, fix-sent-invoice-journals and repair-invoice.
      # Two problems, both proven in v3.74.733:
      #
      #   1. Three files out of 112 that use the service-role key. Nothing
      #      covered the rest, and nobody grew the list.
      #   2. It checked that the question was asked, not that the answer was
      #      used. fix-negative-payments DID call requireOwnerOrAdmin, threw
      #      away its companyId, and rewrote payments for every tenant. It
      #      would have passed this step.
      #
      # The script below covers all 112 and asks whether the company the route
      # acts on comes from somewhere the caller cannot choose.
      - name: Service-role routes must scope to the caller's company
        run: node scripts/check-service-role-scoping.js

      # v3.74.755 — supabase-js does not throw on a failed write; it returns
      # { error }. Four writes that discarded that result were found broken in
      # a single day, each having reported success for as long as it existed:
      # the customer branch trigger, the nightly integrity cron, the FX
      # revaluation reminder, and a retired repair tool. This stops the count
      # from growing.
      - name: Database writes must not discard their result
        run: node scripts/check-unchecked-writes.js

      - name: Check for NextResponse.json usage in critical endpoints
        run: |
          # Critical endpoints should NOT use NextResponse.json for errors
          if grep -r "NextResponse.json.*error" app/api/fix-inventory/route.ts; then
            echo "❌ fix-inventory still uses NextResponse.json for errors"
            exit 1
          fi
          if grep -r "NextResponse.json.*error" app/api/fix-sent-invoice-journals/route.ts; then
            echo "❌ fix-sent-invoice-journals still uses NextResponse.json for errors"
            exit 1
          fi
          echo "✅ Error handling checks passed"

      - name: Check for NextResponse.json usage in critical endpoints
        run: |
          # Critical endpoints should NOT use NextResponse.json for errors
          if grep -r "NextResponse.json.*error" app/api/fix-inventory/route.ts; then
            echo "❌ fix-inventory still uses NextResponse.json for errors"
            exit 1
          fi
          if grep -r "NextResponse.json.*error" app/api/fix-sent-invoice-journals/route.ts; then
            echo "❌ fix-sent-invoice-journals still uses NextResponse.json for errors"
            exit 1
          fi
          echo "✅ Error handling checks passed"

  ai-governance-audit:
    name: AI Governance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AI governance audit
        run: npm run governance:audit:ci

      - name: Upload governance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-governance-reports
          path: knowledge/governance/

  deploy:
    name: Deploy to Vercel (production)
    needs: [test, security-check, ai-governance-audit]
    runs-on: ubuntu-latest
    # ✅ نشر فقط عند push مباشرة على main (ليس على PR)
    # ملاحظة: التحقق من وجود التوكن يتم داخل سكربت الـ shell لتقليل مشاكل الـ lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      # ✅ هذه الـ secrets اختيارية - إذا لم تكن موجودة، سيتم تمرير قيم فارغة
      # ⚠️ Linter warnings هنا طبيعية ومتوقعة - الـ linter لا يعرف أن الـ secrets موجودة أم لا
      # هذه تحذيرات فقط (warnings) وليست أخطاء (errors)، ويمكن تجاهلها بأمان
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (if token configured)
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "⚠️ Skipping Vercel deploy - VERCEL_TOKEN is not configured in GitHub Secrets"
            exit 0
          fi

          # 🔐 سحب إعدادات Vercel للبيئة الإنتاجية
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          # 🏗️ بناء مسبق باستخدام Vercel
          npx vercel build --prod --token="$VERCEL_TOKEN"

          # 🚀 نشر النسخة المبنية إلى الإنتاج
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

